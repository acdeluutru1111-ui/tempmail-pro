services:
  - type: web
    name: tempmail-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CLOUDFLARE_WORKER_URL
        sync: false
      - key: WORKER_API_KEY
        sync: false
